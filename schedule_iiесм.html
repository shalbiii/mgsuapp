<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Расписание ИИЭСМ</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700;900&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c14;
    --bg2: #111320;
    --bg3: #181c2e;
    --card: #1a1f35;
    --card2: #1e2440;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e8a4;
    --text: #e8eaf6;
    --text2: #9fa8da;
    --text3: #5c6bc0;
    --border: rgba(108,99,255,0.18);
    --shadow: 0 4px 32px rgba(0,0,0,0.5);
    --lec: #4fc3f7;
    --prac: #81c784;
    --lab: #ffb74d;
    --cop: #ce93d8;
    --krp: #f48fb1;
    --sport: #4db6ac;
    --empty: #37415166;
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background ambient */
  body::before {
    content:'';
    position:fixed; inset:0;
    background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(108,99,255,0.09) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(67,232,164,0.06) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }

  .container { max-width: 1440px; margin: 0 auto; padding: 0 24px; position:relative; z-index:1; }

  /* Header */
  header {
    padding: 36px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .logo-block h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(18px, 3vw, 28px);
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent3) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-block p {
    font-size: 13px;
    color: var(--text3);
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* Week toggle */
  .week-toggle {
    display: flex;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }
  .week-btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Golos Text', sans-serif;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    background: transparent;
    color: var(--text2);
  }
  .week-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 16px rgba(108,99,255,0.4);
  }
  .week-btn:not(.active):hover { background: var(--card2); color: var(--text); }

  /* Controls */
  .controls {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
    max-width: 400px;
  }
  .search-wrap svg {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color: var(--text3);
    pointer-events:none;
  }
  .search-input {
    width: 100%;
    padding: 11px 16px 11px 42px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .filter-select {
    padding: 11px 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    font-size: 14px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    min-width: 170px;
  }
  .filter-select:focus { border-color: var(--accent); }
  .filter-select option { background: var(--bg3); }

  /* Group selector */
  .groups-panel {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 32px;
  }
  .program-section {}
  .program-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    padding-left: 2px;
  }
  .group-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .group-chip {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Golos Text', sans-serif;
    white-space: nowrap;
  }
  .group-chip:hover { border-color: var(--accent); color: var(--text); background: var(--card2); }
  .group-chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 2px 12px rgba(108,99,255,0.35);
  }

  /* Schedule Grid */
  .schedule-area {
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .day-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }

  .day-header {
    padding: 14px 18px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .day-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
  }
  .day-lessons-count {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    background: var(--bg);
    padding: 3px 9px;
    border-radius: 20px;
  }

  .pairs-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .pair-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .pair-num-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 36px;
    padding-top: 2px;
  }
  .pair-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text3);
    line-height:1;
  }
  .pair-time {
    font-size: 9px;
    color: var(--text3);
    text-align: center;
    margin-top: 3px;
    line-height: 1.3;
    opacity: 0.7;
  }
  .pair-content {
    flex: 1;
    min-width: 0;
  }

  /* Lesson card */
  .lesson-card {
    border-radius: 10px;
    padding: 9px 12px;
    background: var(--bg3);
    border-left: 3px solid var(--accent);
    transition: background 0.15s;
    position: relative;
  }
  .lesson-card:hover { background: var(--card2); }
  .lesson-card.empty {
    border-left-color: transparent;
    opacity: 0.3;
    background: transparent;
    padding: 6px 12px;
  }
  .lesson-card.empty .lesson-name { font-size: 12px; color: var(--text3); font-style: italic; }

  .lesson-type-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: rgba(108,99,255,0.2);
    color: var(--accent);
  }
  .lesson-type-badge.лек { background: rgba(79,195,247,0.15); color: var(--lec); }
  .lesson-type-badge.пра { background: rgba(129,199,132,0.15); color: var(--prac); }
  .lesson-type-badge.лаб { background: rgba(255,183,77,0.15); color: var(--lab); }
  .lesson-type-badge.коп { background: rgba(206,147,216,0.15); color: var(--cop); }
  .lesson-type-badge.крп { background: rgba(244,143,177,0.15); color: var(--krp); }
  .lesson-type-badge.спо { background: rgba(77,182,172,0.15); color: var(--sport); }

  .lesson-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 4px;
  }
  .lesson-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    margin-top: 2px;
  }
  .lesson-teacher {
    font-size: 11px;
    color: var(--text2);
  }
  .lesson-room {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent3);
    background: rgba(67,232,164,0.1);
    padding: 1px 7px;
    border-radius: 4px;
  }

  /* Lesson card border colors by type */
  .lesson-card.type-л { border-left-color: var(--lec); }
  .lesson-card.type-пр { border-left-color: var(--prac); }
  .lesson-card.type-лаб { border-left-color: var(--lab); }
  .lesson-card.type-коп { border-left-color: var(--cop); }
  .lesson-card.type-крп { border-left-color: var(--krp); }
  .lesson-card.type-спорт { border-left-color: var(--sport); }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  /* No group selected */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text3);
  }
  .empty-state svg {
    width: 64px; height: 64px;
    opacity: 0.3;
    margin-bottom: 16px;
  }
  .empty-state h3 {
    font-family: 'Unbounded', sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text2);
  }
  .empty-state p { font-size: 14px; }

  .group-info-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .group-info-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .group-info-week {
    font-size: 13px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 6px;
    background: rgba(108,99,255,0.15);
    color: var(--accent);
  }
  .group-info-prog {
    font-size: 12px;
    color: var(--text3);
  }
  .total-lessons {
    margin-left: auto;
    font-size: 13px;
    color: var(--text2);
  }
  .total-lessons span {
    font-weight: 700;
    color: var(--accent3);
  }

  @media (max-width: 700px) {
    .days-grid { grid-template-columns: 1fr; }
    .header-top { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>

</div>

const PROG_LABELS = {
  'ВиВ': 'ВиВ · 08.03.01 · Водоснабжение и водоотведение',
  'ТГВ': 'ТГВ · 08.03.01 · Теплогазоснабжение и вентиляция',
  'ТЭОЖКХ': 'ТЭОЖКХ · 08.03.01',
  'ГСХ': 'ГСХ · 08.03.01 · Гидротехническое строительство',
  'ЦиАТП': 'ЦиАТП · 15.03.04',
  'ПТСДСиО': 'ПТСДСиО · 23.05.01'
};

function getShortName(fullKey) {
  const m = fullKey.match(/1к (\d+)/);
  return m ? `Группа ${m[1]}` : fullKey;
}

function getProgramOf(key) {
  for (const [prog, list] of Object.entries(PROGRAMS)) {
    if (list.includes(key)) return prog;
  }
  return '';
}

function parseLesson(raw) {
  if (!raw || raw === 'ОКНО') return null;
  
  // Check for sports
  if (raw.includes('Физическая культура')) {
    return { type: 'спорт', typeBadge: 'спо', name: 'Физическая культура и спорт', teacher: '', room: 'СОК' };
  }
  
  let type = '', typeBadge = '', rest = raw;
  
  if (raw.startsWith('л.')) { type = 'Лекция'; typeBadge = 'лек'; rest = raw.slice(2); }
  else if (raw.startsWith('лаб.')) { type = 'Лабораторная'; typeBadge = 'лаб'; rest = raw.slice(4); }
  else if (raw.startsWith('пр.')) { type = 'Практика'; typeBadge = 'пра'; rest = raw.slice(3); }
  else if (raw.startsWith('КОП ')) { type = 'КОП'; typeBadge = 'коп'; rest = raw.slice(4); }
  else if (raw.startsWith('КРП ')) { type = 'КРП'; typeBadge = 'крп'; rest = raw.slice(4); }
  else { type = ''; typeBadge = ''; rest = raw; }
  
  // Parse teacher and room from rest
  // Pattern: Subject name then teacher (доц./ст.пр./пр./etc.) then room number /building
  const teacherMatch = rest.match(/^(.+?)\s+((?:доц\.|ст\.пр\.|пр\.|проф\.|асс\.)\S+.*?)$/);
  let name = rest, teacher = '', room = '';
  
  if (teacherMatch) {
    name = teacherMatch[1].trim();
    const afterName = teacherMatch[2].trim();
    // Room is usually last: number + /building
    const roomMatch = afterName.match(/(\d[\d\s\w]*\/\S+)$/);
    if (roomMatch) {
      room = roomMatch[1].trim();
      teacher = afterName.slice(0, afterName.length - roomMatch[0].length).trim();
    } else {
      teacher = afterName;
    }
  }
  
  return { type, typeBadge, name, teacher, room };
}

function renderLesson(raw) {
  if (!raw || raw === 'ОКНО') {
    return `<div class="lesson-card empty"><div class="lesson-name">Окно</div></div>`;
  }
  
  const lesson = parseLesson(raw);
  if (!lesson) return `<div class="lesson-card empty"><div class="lesson-name">Окно</div></div>`;
  
  const typeClass = lesson.typeBadge ? `type-${lesson.typeBadge === 'лек' ? 'л' : lesson.typeBadge === 'пра' ? 'пр' : lesson.typeBadge === 'лаб' ? 'лаб' : lesson.typeBadge === 'коп' ? 'коп' : lesson.typeBadge === 'крп' ? 'крп' : 'спорт'}` : '';
  
  let html = `<div class="lesson-card ${typeClass}">`;
  if (lesson.typeBadge) {
    html += `<div class="lesson-type-badge ${lesson.typeBadge}">${lesson.type || lesson.typeBadge.toUpperCase()}</div>`;
  }
  html += `<div class="lesson-name">${lesson.name}</div>`;
  if (lesson.teacher || lesson.room) {
    html += `<div class="lesson-meta">`;
    if (lesson.teacher) html += `<span class="lesson-teacher">${lesson.teacher}</span>`;
    if (lesson.room) html += `<span class="lesson-room">${lesson.room}</span>`;
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function renderSchedule(groupKey) {
  const data = SCHEDULE[groupKey];
  if (!data) return;
  
  const prog = getProgramOf(groupKey);
  const shortName = getShortName(groupKey);
  
  // Count lessons
  let total = 0;
  DAYS.forEach(day => {
    const dayData = data[day];
    if (!dayData) return;
    Object.values(dayData).forEach(pair => {
      if (pair[currentWeek] && pair[currentWeek] !== 'ОКНО') total++;
    });
  });
  
  const weekLabel = currentWeek === 'Нечетная' ? 'Нечётная неделя' : 'Чётная неделя';
  
  document.getElementById('scheduleArea').innerHTML = `
    <div class="group-info-bar">
      <div class="group-info-name">${shortName}</div>
      <div class="group-info-week">${weekLabel}</div>
      <div class="group-info-prog">${PROG_LABELS[prog] || prog}</div>
      <div class="total-lessons">Занятий на неделе: <span>${total}</span></div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  `;
  
  const grid = document.getElementById('daysGrid');
  
  DAYS.forEach(day => {
    const dayData = data[day];
    if (!dayData) return;
    
    let lessonsCount = 0;
    let pairsHtml = '';
    
    for (let p = 1; p <= 6; p++) {

      if (!pair) continue;
      const subject = pair[currentWeek];
      if (subject && subject !== 'ОКНО') lessonsCount++;
      const time = pair.time || '';
      const [t1, t2] = time.split('-');
      pairsHtml += `
        <div class="pair-item">
          <div class="pair-num-block">
            <div class="pair-num">${p}</div>
            <div class="pair-time">${t1 || ''}<br>${t2 || ''}</div>
          </div>
          <div class="pair-content">${renderLesson(subject)}</div>
        </div>
      `;
    }
    
    grid.innerHTML += `
      <div class="day-card">
        <div class="day-header">
          <div class="day-name">${day}</div>
          <div class="day-lessons-count">${lessonsCount} пар</div>
        </div>
        <div class="pairs-list">${pairsHtml}</div>
      </div>
    `;
  });
}

function renderGroups(filter = '', progFilter = '') {
  const panel = document.getElementById('groupsPanel');
  panel.innerHTML = '';
  
  const lFilter = filter.toLowerCase();
  
  for (const [prog, keys] of Object.entries(PROGRAMS)) {
    if (progFilter && prog !== progFilter) continue;
    
    const filtered = keys.filter(k => {
      const short = getShortName(k).toLowerCase();
      const full = k.toLowerCase();
      return !lFilter || short.includes(lFilter) || full.includes(lFilter) || prog.toLowerCase().includes(lFilter);
    });
    
    if (!filtered.length) continue;
    
    const section = document.createElement('div');
    section.className = 'program-section';
    section.innerHTML = `<div class="program-title">${PROG_LABELS[prog] || prog}</div><div class="group-chips"></div>`;
    
    const chips = section.querySelector('.group-chips');
    filtered.forEach(key => {
      const chip = document.createElement('button');
      chip.className = 'group-chip' + (key === currentGroup ? ' active' : '');
      chip.textContent = getShortName(key);
      chip.onclick = () => selectGroup(key);
      chips.appendChild(chip);
    });
    
    panel.appendChild(section);
  }
}

function selectGroup(key) {
  currentGroup = key;
  document.querySelectorAll('.group-chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.group-chip').forEach(c => {
    if (c.textContent === getShortName(key)) c.classList.add('active');
  });
  renderSchedule(key);
  
  // Scroll to schedule
  document.getElementById('scheduleArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function setWeek(week, btn) {
  currentWeek = week;
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentGroup) renderSchedule(currentGroup);
}

function filterGroups() {
  const search = document.getElementById('searchInput').value;
  const prog = document.getElementById('programFilter').value;
  renderGroups(search, prog);
}

// Show empty state initially
document.getElementById('scheduleArea').innerHTML = `
  <div class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
      <line x1="16" y1="2" x2="16" y2="6"></line>
      <line x1="8" y1="2" x2="8" y2="6"></line>
      <line x1="3" y1="10" x2="21" y2="10"></line>
    </svg>
    <h3>Выберите группу</h3>
    <p>Нажмите на номер группы выше, чтобы посмотреть расписание</p>
  </div>
`;

renderGroups();
</script>
